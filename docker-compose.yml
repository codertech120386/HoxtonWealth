services:
  app:
    build:
      context: .
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

  web:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - .:/app:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  worker:
    build:
      context: .
    command: php artisan queue:work --tries=3 --backoff=5 --sleep=1
    restart: unless-stopped
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hoxton
      POSTGRES_USER: hoxton
      POSTGRES_PASSWORD: hoxton
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hoxton -d hoxton"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
