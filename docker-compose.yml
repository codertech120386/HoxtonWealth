# Fleet-deployable compose: code baked into images (no volume mounts), DB is EXTERNAL.
# `web` (nginx) is the public service and serves the environment's URL; `app` (php-fpm) and
# `worker` are internal. Fleet builds each `build:` service, co-locates them on one donor VM (or
# spills across donors over WireGuard), and wires east-west by service name (nginx -> app:9000).
#
# For LOCAL dev (nginx + php-fpm + a local postgres, source volume-mounted) use the original:
#   docker compose -f docker-compose.dev.yml up
#
# SECRETS — set per-service in the Fleet dashboard (Apps -> Env, on <group>-app and <group>-worker):
#   APP_KEY       run `php artisan key:generate --show` locally and paste the base64 key
#   DB_HOST       host of an EXTERNAL managed Postgres (Neon/Supabase/RDS) — NOT "db"
#   DB_DATABASE   database name
#   DB_USERNAME   db user
#   DB_PASSWORD   db password
name: hoxton
services:
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - app
    deploy:
      resources:
        limits:
          memory: 256M   # nginx is tiny -> Fleet 'micro' tier

  app:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    expose:
      - "9000"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: "base64:q9S6pNR8VMbqyRY/Id/1SE/nbUvpb6I4g17qDtdA22Q="
      LOG_CHANNEL: stderr
      DB_CONNECTION: pgsql
      DB_HOST: hoxton-test.cnwaio4woavq.ap-south-1.rds.amazonaws.com
      DB_PORT: "5432"
      DB_DATABASE: hoxton
      DB_USERNAME: hoxton
      DB_PASSWORD: hoxtonhoxton
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      SESSION_DRIVER: array
    deploy:
      resources:
        limits:
          memory: 512M   # php-fpm -> Fleet 'small' tier

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    environment:
      APP_ENV: production
      APP_KEY: "base64:q9S6pNR8VMbqyRY/Id/1SE/nbUvpb6I4g17qDtdA22Q="
      DB_CONNECTION: pgsql
      DB_HOST: hoxton-test.cnwaio4woavq.ap-south-1.rds.amazonaws.com
      DB_PORT: "5432"
      DB_DATABASE: hoxton
      DB_USERNAME: hoxton
      DB_PASSWORD: hoxtonhoxton
      QUEUE_CONNECTION: database
      CACHE_STORE: database
    deploy:
      resources:
        limits:
          memory: 256M   # queue worker -> Fleet 'micro' tier
